name: Tests

# Runs unit tests on every push and PR.
#
# Security posture:
# - Zero github.event.* interpolation (no command-injection vectors).
# - Only matrix.python-version is templated — defined statically below.
# - permissions: contents: read (least privilege).
# - No secrets are referenced.
#
# Why Ubuntu (not macOS): test files (test_redact.py, test_session_mgmt.py)
# stub out mcp, openai, google.auth, and Keychain via subprocess.run mocks,
# so they're portable. mcp_server.py at runtime is macOS-targeted (Keychain
# + fcntl with POSIX fallback), but the test suite is platform-agnostic.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same ref when a new commit lands.
# Saves CI minutes on rapid push sequences (e.g., reviewer fix-ups) and
# means each PR only ever has one current run reflected in its checks.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      # SHA-pin third-party actions (defense against tag-hijacking attacks
      # where a maintainer's tag is moved to point at malicious code).
      # persist-credentials: false prevents the auto-checked-out GITHUB_TOKEN
      # from sitting in .git/config across subsequent steps — we only need
      # checkout for read, never for push, so leaving the token attached is
      # gratuitous attack surface.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        # Pinned to a SHA (v5) and to a specific uv version for fully
        # deterministic CI: failures must be attributable to repo changes,
        # never to an upstream uv release that landed between two of our runs.
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.11.16"

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Run unit tests
        # Test stubs (_build_stub_modules in both test_redact.py and
        # test_session_mgmt.py) cover every module-level import in
        # mcp_server.py: openai, mcp.*, google.auth.*, and httpx. Each file
        # scopes its stubs via mock.patch.dict(sys.modules, ...) so they
        # don't leak across files — results are order-independent. pytest
        # is the only real dependency CI needs — no transitive
        # httpx/requests install. Adding a new module-level import to
        # mcp_server.py means extending the stubs in BOTH files, not
        # patching this workflow.
        run: uv run --with pytest pytest test_redact.py test_session_mgmt.py test_agent_research.py -q

      - name: Ruff format check
        run: uv tool run ruff format --check mcp_server.py test_redact.py test_session_mgmt.py test_agent_research.py
