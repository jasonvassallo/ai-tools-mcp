name: Tests

# Runs unit tests on every push and PR.
#
# Security posture:
# - Zero github.event.* interpolation (no command-injection vectors).
# - Only matrix.python-version is templated — defined statically below.
# - permissions: contents: read (least privilege).
# - No secrets are referenced.
#
# Why Ubuntu (not macOS): all four test files (test_redact.py,
# test_session_mgmt.py, test_agent_research.py, test_local_delegate.py)
# share a stub-import harness that stubs out mcp, openai, google.auth, and
# Keychain via subprocess.run mocks, so they're portable. mcp_server.py at
# runtime is macOS-targeted (Keychain + fcntl with POSIX fallback), but the
# test suite is platform-agnostic.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same ref when a new commit lands.
# Saves CI minutes on rapid push sequences (e.g., reviewer fix-ups) and
# means each PR only ever has one current run reflected in its checks.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      # SHA-pin third-party actions (defense against tag-hijacking attacks
      # where a maintainer's tag is moved to point at malicious code).
      # persist-credentials: false prevents the auto-checked-out GITHUB_TOKEN
      # from sitting in .git/config across subsequent steps — we only need
      # checkout for read, never for push, so leaving the token attached is
      # gratuitous attack surface.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        # Pinned to a SHA (v5) and to a specific uv version for fully
        # deterministic CI: failures must be attributable to repo changes,
        # never to an upstream uv release that landed between two of our runs.
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.11.16"

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Run unit tests
        # Test stubs (_build_stub_modules in both test_redact.py and
        # test_session_mgmt.py) cover every module-level import in
        # mcp_server.py: openai, mcp.*, google.auth.*, and httpx. Each file
        # scopes its stubs via mock.patch.dict(sys.modules, ...) so they
        # don't leak across files — results are order-independent. pytest
        # is the only real dependency CI needs — no transitive
        # httpx/requests install. Adding a new module-level import to
        # mcp_server.py means extending the stubs in BOTH files, not
        # patching this workflow.
        run: uv run --with pytest pytest test_redact.py test_session_mgmt.py test_agent_research.py test_local_delegate.py -q

      - name: Ruff format check
        run: uv tool run ruff format --check mcp_server.py test_redact.py test_session_mgmt.py test_agent_research.py test_local_delegate.py

  prerelease-guard:
    # The UV_PRERELEASE=if-necessary-or-explicit pin is duplicated across
    # every launch/check surface by necessity (uv config discovery is
    # cwd-based and uv.toml has no include mechanism — see uv.toml's
    # comments), so there is no single source of truth. This job turns the
    # "update all copies together" convention documented in AGENTS.md into
    # an enforced invariant: a future edit that drops or changes the pin on
    # only some surfaces fails CI instead of drifting silently.
    name: prerelease policy pin check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Verify UV_PRERELEASE pins on all launch surfaces
        run: |
          set -euo pipefail
          PIN='UV_PRERELEASE["=: ]+["]?if-necessary-or-explicit'
          fail=0

          # file:minimum-occurrences — install.sh has two call sites
          # (the generated server entry and the post-install --check).
          # README.md carries four documented examples (two claude-mcp-add
          # one-liners, the macOS multiline form, and the JSON snippet) —
          # copy-paste sources for real launch configs, so they're held to
          # the same invariant as the executable surfaces.
          for spec in .mcp.json:1 mcpb/manifest.json:1 hooks/preflight.sh:1 install.sh:2 README.md:4; do
            file="${spec%:*}"; want="${spec#*:}"
            got=$(grep -Ec "$PIN" "$file" || true)
            if [ "$got" -lt "$want" ]; then
              echo "FAIL: $file has $got pin(s), expected >= $want"
              fail=1
            else
              echo "ok: $file ($got pin(s))"
            fi
          done

          # Repo-cwd runs are covered by uv.toml rather than an env pin.
          if grep -q '^prerelease = "if-necessary-or-explicit"$' uv.toml; then
            echo "ok: uv.toml policy line present"
          else
            echo "FAIL: uv.toml is missing the prerelease policy line"
            fail=1
          fi

          exit "$fail"
