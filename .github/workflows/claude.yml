name: Claude Code

# Invokes anthropics/claude-code-action when @claude is mentioned on a
# PR or issue. Source: https://github.com/anthropics/claude-code-action
# Canonical example: .../examples/claude.yml
#
# Prerequisite secret: ANTHROPIC_API_KEY must be set on the repo via:
#   gh secret set ANTHROPIC_API_KEY -R jasonvassallo/ai-tools-mcp
# (reads from stdin so the key is never in shell history).
#
# Security note: the `contains()` calls in the `if:` block evaluate
# untrusted comment bodies, but only for substring matching — they do
# NOT shell-execute the value. The action itself (Anthropic-maintained)
# is what handles the comment body downstream; we trust Anthropic's
# vetting of that path. No `run:` step in this workflow interpolates
# untrusted input into a shell command.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is mentioned in the relevant body.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
