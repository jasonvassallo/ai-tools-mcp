# Resolution policy for uv script runs in this repo.
#
# Pins prerelease handling to the uv default so an ambient user-level
# uv.toml cannot silently opt this project into prerelease resolution
# (mcp 2.0.0b2 removed mcp.types and breaks mcp_server.py at import).
#
# Known limits (both verified 2026-07-22, uv 0.11.29):
# - The UV_PRERELEASE environment variable takes precedence over this
#   file. The "mcp>=1.0.0,<2" pin in mcp_server.py is the guard that
#   holds in that case.
# - uv discovers config from the invocation cwd, not the script path,
#   so this file only covers runs launched from the repo. Installed and
#   packaged launch paths (install.sh, plugin .mcp.json, mcpb manifest)
#   instead pin UV_PRERELEASE in their launch env, which also defeats
#   an ambient env var.
# - Key and value verified on uv 0.11.29 (minimum verified version).
#   An older uv that doesn't recognize them may silently ignore this
#   file rather than error — don't assume the guard holds below that.
prerelease = "if-necessary-or-explicit"
